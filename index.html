<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyansh Singh</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#020617;
  color:#fff;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:180px;
  gap:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:18px;
  padding:15px;
  backdrop-filter:blur(12px);
  transition:.3s;
  position:relative;
  overflow:hidden;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}

/* SIZES */
.big{grid-column:span 2;grid-row:span 2;}
.wide{grid-column:span 2;}
.tall{grid-row:span 2;}

/* HERO */
.hero h1{
  font-size:2rem;
}
.hero span{
  color:cyan;
}
.hero p{
  opacity:.7;
  margin-top:10px;
}

/* IMAGE */
.profile{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:15px;
}

/* VIDEO */
video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
}

/* CERT STACK */
.cert-stack{
  position:relative;
  width:100%;
  height:100%;
}
.cert{
  position:absolute;
  width:100%;
  height:100%;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  transition:.5s;
}

/* CONTACT */
.icons{
  display:flex;
  gap:15px;
  margin-top:10px;
}
.icons img{
  width:28px;
}

/* MOBILE */
@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<div class="grid">

<!-- HERO -->
<div class="card big hero">
  <h1>Hi, I'm <span>Riyansh</span></h1>
  <p>Aspiring Developer & Creative Editor</p>
</div>

<!-- PROFILE -->
<div class="card tall">
  <img src="images/profile.jpeg" class="profile">
</div>

<!-- TURF -->
<div class="card wide">
  <video autoplay muted loop>
    <source src="videos/turf-demo.mp4">
  </video>
</div>

<!-- FUNHUB -->
<div class="card">
  <img src="images/funhub-project.png" class="profile">
</div>

<!-- EDIT 1 -->
<div class="card">
  <video autoplay muted loop>
    <source src="videos/shot-1.mp4">
  </video>
</div>

<!-- EDIT 2 -->
<div class="card">
  <video autoplay muted loop>
    <source src="videos/shot-2.mp4">
  </video>
</div>

<!-- CERTIFICATES -->
<div class="card big">
  <div class="cert-stack">
    <div class="cert" style="background-image:url('images/cert-infosys-ai.jpeg')"></div>
    <div class="cert" style="background-image:url('images/cert-infosys-generative.jpeg')"></div>
    <div class="cert" style="background-image:url('images/cert-launchpad.jpeg')"></div>
  </div>
  <p style="opacity:.6">Swipe / Auto View</p>
</div>

<!-- TIMELINE -->
<div class="card wide">
  <p>⚽ 2024 - State Football League</p>
  <p>💼 2025 - First Client Project</p>
  <p>📚 2026 - Learning Java & Python</p>
</div>

<!-- CONTACT -->
<div class="card">
  <h3>Contact</h3>
  <div class="icons">
    <a href="https://github.com/riiyansh-singh"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"></a>
    <a href="https://www.linkedin.com/in/riyansh-singh-839817385"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png"></a>
    <a href="https://www.instagram.com/riiiyanshh.3"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
  </div>
</div>

</div>

<script>
// CERT AUTO SWITCH
let certs=document.querySelectorAll(".cert");
let i=0;

setInterval(()=>{
  certs[i].style.opacity="0";
  i=(i+1)%certs.length;
  certs[i].style.opacity="1";
},2500);
</script>

</body>
</html>
