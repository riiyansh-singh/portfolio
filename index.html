<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyansh Singh</title>

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#050505;color:#fff;overflow-x:hidden;}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}
.logo{
width:40px;height:40px;
background:#fff;color:#000;
display:flex;align-items:center;justify-content:center;
font-weight:bold;border-radius:10px;
}
.nav button{
background:#fff;color:#000;
padding:10px 20px;border:none;
border-radius:20px;cursor:pointer;
}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
min-height:100vh;
padding:100px 10%;
}

.hero-left h1{
font-size:6vw;
font-weight:900;
line-height:0.8;
text-transform:uppercase;
}
.hero-left span{
background:linear-gradient(to right,white,gray);
-webkit-background-clip:text;
color:transparent;
}
.hero-left h2{margin-top:20px;color:cyan;}
.hero-left p{margin-top:15px;max-width:400px;opacity:0.7;}

.hero-right{
display:flex;
flex-direction:column;
gap:20px;
}
.contact-box{
background:#111;
padding:15px 20px;
border-radius:20px;
border:1px solid #222;
}
.socials{display:flex;gap:15px;}
.socials a{
font-size:20px;
padding:12px;
background:#111;
border-radius:15px;
color:white;
transition:.3s;
}
.socials a:hover{background:cyan;color:black;}

/* SECTION */
section{padding:80px 10%;}
h2{text-align:center;margin-bottom:40px;}

/* PROJECTS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#111;
padding:15px;
border-radius:15px;
transition:.3s;
}
.card:hover{transform:translateY(-5px);}
.card img{width:100%;border-radius:10px;}
video{width:100%;margin-top:10px;border-radius:10px;}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}
.fade.show{
opacity:1;
transform:translateY(0);
}

/* MOBILE */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center;gap:40px;}
.hero-left h1{font-size:60px;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
<div class="logo">R</div>
<button onclick="hireMe()">Contact</button>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-left">
<h1>
Riyansh <br>
<span>Singh</span>
</h1>

<h2>Developer & Creative Builder</h2>

<p>
Exploring code, robotics, and creative visuals while building real-world projects.
</p>
</div>

<div class="hero-right">

<div class="contact-box">
<p>📩 singhriyansh2006@gmail.com</p>
</div>

<div class="socials">
<a href="https://github.com/riiyansh-singh" target="_blank"><i class="fab fa-github"></i></a>
<a href="https://www.linkedin.com/in/riyansh-singh-839817385" target="_blank"><i class="fab fa-linkedin"></i></a>
<a href="https://www.instagram.com/riiiyanshh.3" target="_blank"><i class="fab fa-instagram"></i></a>
</div>

</div>

</section>

<!-- PROJECTS -->
<section class="fade">
<h2>Projects</h2>

<div class="projects">

<div class="card">
<img src="images/turf-project.png">
<h3>Turf Tournament</h3>
<a href="https://onlineprojects-ui.github.io/The-Turf-Tournament-/index.html" target="_blank">Live</a>
<video controls src="videos/turf-demo.mp4"></video>
</div>

<div class="card">
<img src="images/funhub-project.png">
<h3>FunHub</h3>
<a href="https://riiyansh-singh.github.io/FunHub/" target="_blank">Live</a>
<video controls src="videos/funhub-demo.mp4"></video>
</div>

<div class="card">
<img src="images/slice-frenzy.png">
<h3>Slice Frenzy</h3>
<a href="https://riiyansh-singh.github.io/slice-frenzy/" target="_blank">Play</a>
<video controls src="videos/Fruit.mp4"></video>
</div>

</div>
</section>

<script>
// fade animation
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

// contact button
function hireMe(){
  window.location.href = "mailto:singhriyansh2006@gmail.com";
}
</script>

</body>
</html>
