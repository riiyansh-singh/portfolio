<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyansh Singh</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#020617;
  color:#fff;
  overflow-x:hidden;
}

/* PARTICLES */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* CURSOR */
.cursor{
  width:300px;
  height:300px;
  position:fixed;
  background:radial-gradient(circle,rgba(0,255,255,0.2),transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 25px;
  border-radius:30px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.08);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10%;
  flex-wrap:wrap;
}

.hero h1{
  font-size:4rem;
}
.hero span{
  color:cyan;
  text-shadow:0 0 25px cyan;
}

.typing{
  font-size:1.2rem;
  opacity:.7;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  background:linear-gradient(45deg,cyan,purple);
  transition:.3s;
  cursor:pointer;
}
.btn:hover{
  box-shadow:0 0 25px cyan;
}

/* IMAGE */
.hero-img img{
  width:260px;
  border-radius:50%;
  box-shadow:0 0 60px cyan;
}

/* SECTION */
section{
  padding:80px 20px;
  text-align:center;
}

/* PROJECT */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}
.card{
  background:#0a0a0a;
  padding:15px;
  border-radius:12px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(0,255,255,0.3);
}

/* CERT */
.card-stack{
  position:relative;
  width:90vw;
  max-width:500px;
  height:300px;
  margin:auto;
}
.card-cert{
  position:absolute;
  width:100%;
  height:100%;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  transition:.5s;
}

/* TIMELINE */
.timeline{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
.timeline-item{
  padding:15px;
  background:#0a0a0a;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
.hero{
  flex-direction:column;
  text-align:center;
}
.hero h1{font-size:2.5rem;}
.hero-img img{width:180px;}
}
</style>
</head>

<body>

<div id="particles-js"></div>
<div class="cursor"></div>

<nav>Riyansh Singh</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>HI, I'M <span>RIYANSH</span></h1>
<div class="typing" id="typing"></div>
<div class="btn">View Work</div>
</div>

<div class="hero-img">
<img src="images/profile.jpeg" id="tilt">
</div>
</section>

<!-- PROJECTS -->
<section>
<h2>Projects</h2>
<div class="projects">

<div class="card">
<img src="images/turf-project.png">
<video controls>
<source src="videos/turf-demo.mp4">
</video>
</div>

<div class="card">
<img src="images/funhub-project.png">
<video controls>
<source src="videos/funhub-demo.mp4">
</video>
</div>

</div>
</section>

<!-- CERT -->
<section>
<h2>Certificates</h2>
<div class="card-stack">
<div class="card-cert" style="background-image:url('images/cert-infosys-ai.jpeg')"></div>
<div class="card-cert" style="background-image:url('images/cert-infosys-generative.jpeg')"></div>
<div class="card-cert" style="background-image:url('images/cert-launchpad.jpeg')"></div>
</div>
<p style="opacity:.6">Swipe to view certificates</p>
</section>

<!-- TIMELINE -->
<section>
<h2>Timeline</h2>
<div class="timeline">
<div class="timeline-item">2024 - State Football League</div>
<div class="timeline-item">2025 - First Client Project</div>
<div class="timeline-item">2026 - Learning Java & Python</div>
</div>
</section>

<script>
// PARTICLES
particlesJS("particles-js",{
  particles:{
    number:{value:50},
    size:{value:3},
    move:{speed:1},
    line_linked:{enable:true}
  }
});

// CURSOR
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// TILT
const tilt=document.getElementById("tilt");
document.addEventListener("mousemove",e=>{
let x=(window.innerWidth/2-e.pageX)/25;
let y=(window.innerHeight/2-e.pageY)/25;
tilt.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

// TYPING EFFECT
const text="Aspiring Developer | Creative Editor";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
type();

// CERT SWIPE
let cards=document.querySelectorAll(".card-cert");
let index=0;
setInterval(()=>{
cards[index].style.opacity="0";
index=(index+1)%cards.length;
cards[index].style.opacity="1";
},2500);
</script>

</body>
</html>
