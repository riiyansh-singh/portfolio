<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyansh Singh — Developer & Creative Builder</title>
<meta name="description" content="Portfolio of Riyansh Singh — Developer, Robotics Builder & Creative Tech Enthusiast from Agra, India.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060608;--bg2:#0c0c10;--bg3:#111118;
  --surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --cyan:#00e5ff;--purple:#7b5ea7;
  --white:#f0f0f5;--muted:rgba(240,240,245,0.45);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--r:20px;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:var(--fb);overflow-x:hidden;cursor:none;}
a{text-decoration:none;cursor:none;}button{cursor:none;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--cyan);}

#progress-bar{position:fixed;top:0;left:0;height:2px;width:0;background:linear-gradient(to right,var(--cyan),var(--purple));z-index:9999;transition:width .1s;}
#cursor{width:10px;height:10px;background:var(--cyan);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:transform .2s;}
#cursor-ring{width:34px;height:34px;border:1px solid rgba(0,229,255,.4);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9997;transform:translate(-50%,-50%);}

#loader{position:fixed;inset:0;background:var(--bg);z-index:9990;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s,visibility .6s;}
#loader.hidden{opacity:0;visibility:hidden;}
.loader-name{font-family:var(--fh);font-size:40px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;color:transparent;}
.loader-bar-wrap{width:200px;height:2px;background:var(--surface);border-radius:2px;overflow:hidden;}
.loader-bar{height:100%;width:0;background:linear-gradient(to right,var(--cyan),var(--purple));animation:loadFill 1.8s ease forwards;}
.loader-sub{font-size:11px;color:var(--muted);letter-spacing:2px;}
@keyframes loadFill{to{width:100%;}}

body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9000;opacity:.35;}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-glow::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,.06),transparent 70%);top:-200px;right:-200px;animation:dA 14s ease-in-out infinite alternate;}
.bg-glow::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(123,94,167,.05),transparent 70%);bottom:-100px;left:-100px;animation:dB 17s ease-in-out infinite alternate;}
@keyframes dA{to{transform:translate(60px,80px);}}@keyframes dB{to{transform:translate(-40px,-60px);}}

.nav{position:fixed;top:0;width:100%;z-index:1000;padding:16px 6%;display:flex;justify-content:space-between;align-items:center;background:rgba(6,6,8,.75);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:padding .3s;}
.nav.scrolled{padding:10px 6%;}
.logo{font-family:var(--fh);font-size:22px;font-weight:800;}.logo span{color:var(--cyan);}
.nav-links{display:flex;gap:26px;list-style:none;}
.nav-links a{font-size:13px;color:var(--muted);letter-spacing:.5px;position:relative;transition:color .3s;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--cyan);transition:width .3s;}
.nav-links a:hover{color:var(--white);}.nav-links a:hover::after{width:100%;}
.nav-btn{padding:9px 22px;background:var(--cyan);color:#000;border:none;border-radius:50px;font-family:var(--fh);font-size:13px;font-weight:700;transition:.3s;box-shadow:0 0 20px rgba(0,229,255,.3);}
.nav-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,229,255,.5);}

.hero{min-height:100vh;display:grid;grid-template-columns:1fr 360px;align-items:center;gap:60px;padding:120px 6% 80px;position:relative;z-index:1;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:50px;font-size:12px;color:var(--muted);margin-bottom:28px;animation:fadeUp .8s ease both;}
.dot{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero-title{font-family:var(--fh);font-size:clamp(52px,7vw,100px);font-weight:800;line-height:.9;letter-spacing:-3px;margin-bottom:24px;animation:fadeUp .9s .1s ease both;}
.hero-title .line1{display:block;}.hero-title .line2{display:block;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;color:transparent;}
.hero-typing{font-size:16px;color:var(--muted);line-height:1.8;max-width:500px;margin-bottom:10px;animation:fadeUp 1s .2s ease both;min-height:28px;}
.cursor-blink{display:inline-block;width:2px;height:16px;background:var(--cyan);margin-left:2px;vertical-align:middle;animation:blink .8s infinite;}
.hero-age{font-size:13px;color:var(--muted);margin-bottom:32px;animation:fadeUp 1s .25s ease both;}
.hero-age b{color:var(--cyan);}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp 1s .3s ease both;}
.btn-primary{padding:13px 28px;background:var(--cyan);color:#000;border-radius:50px;font-family:var(--fh);font-size:14px;font-weight:700;transition:.3s;box-shadow:0 0 25px rgba(0,229,255,.35);}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 0 40px rgba(0,229,255,.55);}
.btn-secondary{padding:13px 28px;background:transparent;color:var(--white);border-radius:50px;border:1px solid var(--border);font-family:var(--fh);font-size:14px;font-weight:600;transition:.3s;}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan);}
.hero-right{display:flex;flex-direction:column;gap:14px;animation:fadeLeft 1s .4s ease both;}
.profile-ring{width:190px;height:190px;border-radius:50%;border:2px solid transparent;padding:4px;margin:0 auto;background:linear-gradient(var(--bg),var(--bg)) padding-box,linear-gradient(135deg,var(--cyan),var(--purple)) border-box;box-shadow:0 0 40px rgba(0,229,255,.15);animation:rB 8s linear infinite;}
@keyframes rB{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}
.hero-img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;text-align:center;}
.info-card .lbl{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:.8px;text-transform:uppercase;}
.info-card .val{font-size:13px;font-weight:500;word-break:break-all;}
.copy-wrap{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.copy-btn{background:none;border:1px solid rgba(0,229,255,.2);color:var(--cyan);font-size:11px;padding:2px 7px;border-radius:6px;transition:.3s;}
.copy-btn:hover{background:rgba(0,229,255,.1);}
.socials-row{display:flex;gap:10px;justify-content:center;}
.socials-row a{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:16px;transition:.3s;}
.socials-row a:hover{background:var(--cyan);color:#000;border-color:var(--cyan);transform:translateY(-3px);}

.stats-strip{position:relative;z-index:1;padding:40px 6%;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;justify-content:space-around;flex-wrap:wrap;gap:30px;}
.stat-num{font-family:var(--fh);font-size:42px;font-weight:800;color:var(--cyan);line-height:1;}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.5px;}

section{padding:100px 6%;position:relative;z-index:1;}
.section-tag{display:inline-block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;}
.section-title{font-family:var(--fh);font-size:clamp(32px,4vw,52px);font-weight:800;letter-spacing:-1.5px;margin-bottom:50px;line-height:1.05;}
.section-title span{color:var(--cyan);}

.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;}
.about-text{font-size:15px;line-height:1.9;color:var(--muted);}.about-text p{margin-bottom:18px;}.about-text b{color:var(--white);}
.tags-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px;}
.tag{padding:7px 16px;background:var(--surface);border:1px solid var(--border);border-radius:50px;font-size:12px;color:var(--muted);transition:.3s;}
.tag:hover{border-color:var(--cyan);color:var(--white);}
.skills-list{display:flex;flex-direction:column;gap:16px;}
.skill-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px;}
.skill-header span:last-child{color:var(--cyan);}
.skill-bar{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;}
.skill-fill{height:100%;background:linear-gradient(to right,var(--cyan),var(--purple));border-radius:2px;width:0;transition:width 1.5s cubic-bezier(.25,1,.5,1);}

.filter-tabs{display:flex;gap:10px;margin-bottom:36px;flex-wrap:wrap;}
.filter-btn{padding:8px 20px;background:var(--surface);border:1px solid var(--border);border-radius:50px;font-size:13px;color:var(--muted);transition:.3s;font-family:var(--fb);}
.filter-btn.active,.filter-btn:hover{background:var(--cyan);color:#000;border-color:var(--cyan);}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;}
.project-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.4s cubic-bezier(.25,1,.5,1);}
.project-card:hover{transform:translateY(-8px);border-color:rgba(0,229,255,.3);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(0,229,255,.08);}
.card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.card-body{padding:20px;}
.card-title{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:6px;}
.card-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.card-tech{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tech-pill{padding:3px 10px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.15);border-radius:50px;font-size:11px;color:var(--cyan);}
.card-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.live-btn{padding:7px 18px;background:var(--cyan);color:#000;border-radius:50px;font-size:12px;font-family:var(--fh);font-weight:700;transition:.3s;}
.live-btn:hover{box-shadow:0 0 20px rgba(0,229,255,.5);}
.repo-btn{padding:7px 14px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:50px;font-size:12px;transition:.3s;display:inline-flex;align-items:center;gap:5px;}
.repo-btn:hover{border-color:var(--cyan);color:var(--white);}
.video-toggle{padding:7px 14px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:50px;font-size:12px;transition:.3s;display:flex;align-items:center;gap:6px;font-family:var(--fb);}
.video-toggle:hover{border-color:var(--cyan);color:var(--white);}
.featured-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--yellow,#ffd166);background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.2);padding:3px 10px;border-radius:50px;margin-bottom:10px;letter-spacing:.5px;}
.project-card.featured{border-color:rgba(255,209,102,.2);box-shadow:0 0 30px rgba(255,209,102,.05);}
.project-card.featured:hover{border-color:rgba(255,209,102,.4);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(255,209,102,.1);}

/* TECH STACK */
.stack-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;}
.stack-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:.3s;}
.stack-card:hover{border-color:rgba(0,229,255,.25);}
.stack-card-title{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;}
.stack-items{display:flex;flex-wrap:wrap;gap:10px;}
.stack-item{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:50px;font-size:13px;transition:.3s;}
.stack-item:hover{border-color:var(--cyan);color:var(--white);}
.stack-item i{font-size:15px;}
.card-video-wrap{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.25,1,.5,1);padding:0 20px;}
.card-video-wrap.open{max-height:400px;padding-bottom:20px;}
.card-video-wrap video{width:100%;border-radius:12px;display:block;}

.robotics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;}
.robot-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.4s;}
.robot-card:hover{transform:translateY(-6px);border-color:rgba(0,229,255,.3);box-shadow:0 20px 50px rgba(0,0,0,.4);}
.robot-imgs{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.robot-imgs img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.robot-body{padding:20px;}
.robot-title{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:6px;}
.robot-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.robot-badge{display:inline-block;margin-top:12px;padding:4px 12px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);border-radius:50px;font-size:11px;color:var(--cyan);}

.github-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.repo-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:20px;transition:.3s;display:flex;flex-direction:column;gap:10px;}
.repo-card:hover{border-color:rgba(0,229,255,.3);transform:translateY(-4px);}
.repo-name{font-family:var(--fh);font-size:15px;font-weight:700;}
.repo-desc{font-size:12px;color:var(--muted);line-height:1.6;flex:1;}
.repo-meta{display:flex;gap:12px;font-size:12px;color:var(--muted);align-items:center;flex-wrap:wrap;}
.lang-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;}
.repo-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--cyan);border:1px solid rgba(0,229,255,.2);padding:5px 12px;border-radius:50px;transition:.3s;align-self:flex-start;}
.repo-link:hover{background:rgba(0,229,255,.1);}
#github-loading{text-align:center;color:var(--muted);font-size:14px;padding:40px;}
.commit-chart-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:36px;overflow-x:auto;}
.commit-chart-wrap img{width:100%;min-width:600px;display:block;border-radius:8px;}

.videos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.video-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.4s;}
.video-item:hover{transform:translateY(-5px);border-color:rgba(0,229,255,.3);}
.video-item video{width:100%;display:block;border-bottom:1px solid var(--border);}
.video-label{padding:14px 16px;font-size:13px;font-family:var(--fh);font-weight:600;}
.video-label small{display:block;font-family:var(--fb);font-size:11px;color:var(--muted);font-weight:400;margin-top:2px;}

.certs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
.cert-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.4s;}
.cert-card:hover{transform:translateY(-5px) scale(1.02);border-color:rgba(0,229,255,.3);box-shadow:0 0 30px rgba(0,229,255,.1);}
.cert-card img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;}
.cert-label{padding:12px 14px;font-size:12px;color:var(--muted);text-align:center;}
.cert-year{font-size:10px;color:var(--cyan);margin-top:2px;}

.achievements-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;}
.achieve-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:24px;display:flex;flex-direction:column;gap:12px;transition:.3s;}
.achieve-card:hover{border-color:rgba(0,229,255,.3);transform:translateY(-4px);}
.achieve-icon{width:44px;height:44px;border-radius:12px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--cyan);}
.achieve-title{font-family:var(--fh);font-size:15px;font-weight:700;}
.achieve-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.achieve-year{font-size:11px;color:var(--cyan);margin-top:auto;}

.lightbox{display:none;position:fixed;inset:0;z-index:9900;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);align-items:center;justify-content:center;}
.lightbox.active{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;animation:zI .3s ease;}
@keyframes zI{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.lb-close{position:absolute;top:20px;right:28px;font-size:32px;color:var(--muted);background:none;border:none;transition:.2s;}
.lb-close:hover{color:var(--white);}

.timeline-wrap{max-width:700px;margin:0 auto;position:relative;}
.timeline-wrap::before{content:'';position:absolute;left:20px;top:0;bottom:0;width:1px;background:var(--border);}
.t-item{display:flex;gap:28px;align-items:flex-start;margin-bottom:32px;position:relative;}
.t-dot{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--cyan);font-family:var(--fh);position:relative;z-index:1;transition:.3s;}
.t-item:hover .t-dot{background:var(--cyan);color:#000;box-shadow:0 0 20px rgba(0,229,255,.4);}
.t-content{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px 20px;transition:.3s;}
.t-item:hover .t-content{border-color:rgba(0,229,255,.2);}
.t-year{font-size:10px;color:var(--cyan);margin-bottom:4px;letter-spacing:1px;}
.t-title{font-size:15px;font-weight:500;}.t-sub{font-size:12px;color:var(--muted);margin-top:4px;}

.contact-section{text-align:center;padding:120px 6%;background:linear-gradient(to bottom,transparent,var(--bg2));border-top:1px solid var(--border);}
.contact-quote{font-family:var(--fh);font-size:clamp(32px,5vw,72px);font-weight:800;letter-spacing:-2px;margin-bottom:16px;line-height:1.05;}
.contact-quote span{color:var(--cyan);}
.contact-sub{font-size:15px;color:var(--muted);margin-bottom:44px;}
.contact-email-link{font-size:18px;color:var(--white);border-bottom:1px solid var(--border);padding-bottom:4px;transition:.3s;}
.contact-email-link:hover{color:var(--cyan);border-color:var(--cyan);}
.contact-form{max-width:520px;margin:50px auto 0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:32px;text-align:left;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-group label{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.form-group input,.form-group textarea{b
