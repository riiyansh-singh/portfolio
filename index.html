<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyansh Singh</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 25px;
  border-radius:30px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.05);
  z-index:999;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10%;
  flex-wrap:wrap;
}

.hero-text{
  max-width:500px;
}

.hero h1{
  font-size:4rem;
}

.hero span{
  color:cyan;
  text-shadow:0 0 20px cyan;
}

.hero p{
  margin:15px 0;
  opacity:0.7;
}

.btn{
  padding:12px 25px;
  border-radius:30px;
  background:linear-gradient(45deg,cyan,purple);
  color:#fff;
  display:inline-block;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px cyan;
}

/* IMAGE */
.hero-img{
  perspective:1000px;
}
.hero-img img{
  width:260px;
  border-radius:50%;
  box-shadow:0 0 40px cyan;
  transition:transform .2s;
}

/* SECTION */
section{
  padding:60px 20px;
  text-align:center;
}

.container{
  max-width:1100px;
  margin:auto;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}
.card{
  background:#0a0a0a;
  padding:15px;
  border-radius:10px;
  border:1px solid #222;
}
.card img, .card video{
  width:100%;
  border-radius:10px;
}

/* CERTIFICATES */
.card-stack{
  position:relative;
  width:90vw;
  max-width:500px;
  height:300px;
  margin:auto;
}
.card-cert{
  position:absolute;
  width:100%;
  height:100%;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  border-radius:15px;
  transition:.5s;
}

/* TIMELINE */
.timeline{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
.timeline-item{
  padding:15px;
  background:#0a0a0a;
  border-radius:10px;
  border:1px solid #222;
}

/* CONTACT */
.icons{
  display:flex;
  gap:20px;
  justify-content:center;
}
.icons img{
  width:30px;
}

/* MOBILE */
@media(max-width:768px){
.hero{
  flex-direction:column;
  text-align:center;
  gap:40px;
}
.hero h1{font-size:2.5rem;}
.hero-img img{width:180px;}
}
</style>
</head>

<body>

<nav>Riyansh Singh</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>HI, I'M <span>RIYANSH</span></h1>
    <p>Aspiring Developer | Creative Editor</p>
    <a href="#projects" class="btn">View Work</a>
  </div>

  <div class="hero-img">
    <img src="images/profile.jpeg" id="tilt">
  </div>
</section>

<!-- PROJECTS -->
<section id="projects">
<div class="container">
<h2>Projects</h2>

<div class="projects">
<div class="card">
<img src="images/turf-project.png">
<h3>Turf Project</h3>
<video controls>
<source src="videos/turf-demo.mp4">
</video>
</div>

<div class="card">
<img src="images/funhub-project.png">
<h3>FunHub</h3>
<video controls>
<source src="videos/funhub-demo.mp4">
</video>
</div>
</div>

</div>
</section>

<!-- CERTIFICATES -->
<section>
<h2>Certificates</h2>

<div class="card-stack">
<div class="card-cert" style="background-image:url('images/cert-infosys-ai.jpeg')"></div>
<div class="card-cert" style="background-image:url('images/cert-infosys-generative.jpeg')"></div>
<div class="card-cert" style="background-image:url('images/cert-launchpad.jpeg')"></div>
</div>

<p style="opacity:0.6;margin-top:10px;">Swipe to view certificates</p>
</section>

<!-- TIMELINE -->
<section>
<h2>Timeline</h2>

<div class="timeline">
<div class="timeline-item">2024 - State Football</div>
<div class="timeline-item">2025 - First Client Project</div>
<div class="timeline-item">2026 - Learning Java & Python</div>
</div>
</section>

<!-- CONTACT -->
<section>
<h2>Contact</h2>

<div class="icons">
<a href="https://github.com/riiyansh-singh"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"></a>
<a href="https://linkedin.com"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png"></a>
<a href="https://instagram.com/riiiyanshh.3"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
</div>
</section>

<script>
// TILT EFFECT
const tilt = document.getElementById("tilt");

document.addEventListener("mousemove",(e)=>{
let x = (window.innerWidth/2 - e.pageX)/20;
let y = (window.innerHeight/2 - e.pageY)/20;
tilt.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// CERTIFICATE SWIPE
let cards = document.querySelectorAll(".card-cert");
let index=0;

setInterval(()=>{
cards[index].style.opacity="0";
index=(index+1)%cards.length;
cards[index].style.opacity="1";
},2000);
</script>

</body>
</html>
