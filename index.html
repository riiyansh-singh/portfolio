<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyansh Singh</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#020617;
  color:#fff;
  overflow-x:hidden;
}

/* CURSOR GLOW */
.cursor{
  position:fixed;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(0,255,255,0.25), transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:0;
}

/* NAV */
nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 30px;
  border-radius:30px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.08);
  z-index:999;
  box-shadow:0 0 20px rgba(0,255,255,0.1);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10%;
  flex-wrap:wrap;
}

.hero-text{
  max-width:500px;
  animation:fadeUp 1s ease;
}

.hero h1{
  font-size:4rem;
}

.hero span{
  color:cyan;
  text-shadow:0 0 25px cyan;
}

.hero p{
  margin:15px 0;
  opacity:.7;
}

.btn{
  padding:12px 25px;
  border-radius:30px;
  background:linear-gradient(45deg,cyan,purple);
  display:inline-block;
  transition:.3s;
  cursor:pointer;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px cyan;
}

/* IMAGE */
.hero-img{
  perspective:1000px;
}
.hero-img img{
  width:260px;
  border-radius:50%;
  box-shadow:0 0 60px cyan;
  animation:float 4s ease-in-out infinite;
}

/* FLOAT */
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
}

/* FADE */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

/* SECTIONS */
section{
  padding:80px 20px;
  text-align:center;
}

.container{
  max-width:1100px;
  margin:auto;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:#0a0a0a;
  padding:15px;
  border-radius:12px;
  border:1px solid #222;
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(0,255,255,0.3);
}

.card img, video{
  width:100%;
  border-radius:10px;
}

/* CERT STACK */
.card-stack{
  position:relative;
  width:90vw;
  max-width:500px;
  height:300px;
  margin:auto;
}

.card-cert{
  position:absolute;
  width:100%;
  height:100%;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  border-radius:15px;
  transition:all .6s ease;
}

/* TIMELINE */
.timeline{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
.timeline-item{
  padding:15px;
  border-radius:10px;
  background:#0a0a0a;
  border:1px solid #222;
}

/* CONTACT */
.icons{
  display:flex;
  justify-content:center;
  gap:20px;
}
.icons img{
  width:30px;
  transition:.3s;
}
.icons img:hover{
  transform:scale(1.2);
}

/* MOBILE */
@media(max-width:768px){
.hero{
  flex-direction:column;
  text-align:center;
  gap:40px;
}
.hero h1{font-size:2.5rem;}
.hero-img img{width:180px;}
}
</style>
</head>

<body>

<div class="cursor"></div>

<nav>Riyansh Singh</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-text">
<h1>HI, I'M <span>RIYANSH</span></h1>
<p>Aspiring Developer | Creative Editor</p>
<a href="#projects" class="btn">View Work</a>
</div>

<div class="hero-img">
<img src="images/profile.jpeg" id="tilt">
</div>
</section>

<!-- PROJECTS -->
<section id="projects">
<div class="container">
<h2>Projects</h2>

<div class="projects">

<div class="card">
<img src="images/turf-project.png">
<h3>Turf Project</h3>
<video controls>
<source src="videos/turf-demo.mp4">
</video>
</div>

<div class="card">
<img src="images/funhub-project.png">
<h3>FunHub</h3>
<video controls>
<source src="videos/funhub-demo.mp4">
</video>
</div>

</div>
</div>
</section>

<!-- CERTIFICATES -->
<section>
<h2>Certificates</h2>

<div class="card-stack">
<div class="card-cert" style="background-image:url('images/cert-infosys-ai.jpeg')"></div>
<div class="card-cert" style="background-image:url('images/cert-infosys-generative.jpeg')"></div>
<div class="card-cert" style="background-image:url('images/cert-launchpad.jpeg')"></div>
</div>

<p style="opacity:.6;margin-top:10px;">Swipe to view certificates</p>
</section>

<!-- TIMELINE -->
<section>
<h2>Timeline</h2>
<div class="timeline">
<div class="timeline-item">2024 - State Football League</div>
<div class="timeline-item">2025 - First Client Project</div>
<div class="timeline-item">2026 - Learning Java & Python</div>
</div>
</section>

<!-- CONTACT -->
<section>
<h2>Contact</h2>

<div class="icons">
<a href="https://github.com/riiyansh-singh"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"></a>
<a href="https://www.linkedin.com/in/riyansh-singh-839817385"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png"></a>
<a href="https://www.instagram.com/riiiyanshh.3"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
</div>

</section>

<script>
// CURSOR GLOW
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// TILT
const tilt=document.getElementById("tilt");
document.addEventListener("mousemove",e=>{
let x=(window.innerWidth/2-e.pageX)/20;
let y=(window.innerHeight/2-e.pageY)/20;
tilt.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

// CERT AUTO SWIPE
let cards=document.querySelectorAll(".card-cert");
let i=0;
setInterval(()=>{
cards[i].style.opacity="0";
i=(i+1)%cards.length;
cards[i].style.opacity="1";
},2200);
</script>

</body>
</html>
