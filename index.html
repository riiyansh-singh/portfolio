<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyansh Singh</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.0.6/dist/lenis.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background: radial-gradient(circle at top, #0f172a, #020617);color:#fff;overflow-x:hidden;cursor:none;}
a{text-decoration:none;color:cyan;}
.container{max-width:1100px;margin:auto;padding:40px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;}
nav{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.05);padding:10px 25px;border-radius:30px;backdrop-filter:blur(10px);z-index:999;font-weight:bold;}

/* HERO */
.hero{position:relative;padding-top:120px;padding-bottom:60px;overflow:hidden;}
.hero-flex{display:flex;flex-direction:column;align-items:center;gap:15px;}

.hero-img{
  width:260px;
  max-width:80%;
  height:auto;
  object-fit:contain;
  z-index:2;
}

.hero-text h1{
  font-size:2.5rem;
  margin-top:10px;
}
.hero-text p{
  opacity:0.8;
}

.hero-img-secondary{
  position:absolute;
  top:50px;
  right:-40px;
  width:280px;
  opacity:0.12;
  z-index:1;
  pointer-events:none;
  filter:blur(1px);
}

/* TEXT */
h2{margin-bottom:15px;}
h3{margin-top:15px;}
p{opacity:.8;max-width:700px;line-height:1.5;}

/* SKILLS */
.skills{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin-top:20px;}
.skill{border:1px solid #333;padding:10px 20px;border-radius:20px;transition:.3s;}
.skill:hover{background:cyan;color:#000;transform:scale(1.05);}

/* PROJECTS */
.projects{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-top:30px;}
.card{background:#0a0a0a;padding:15px;border:1px solid #222;border-radius:10px;transition:.3s;position:relative;overflow:hidden;}
.card:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 10px 40px rgba(0,255,255,0.25);}
.card img{width:100%;border-radius:10px;margin-bottom:10px;}
.card video{
  width:100%;
  border-radius:10px;
  position:absolute;
  top:0;left:0;
  opacity:0;
  transition:.3s;
}
.card:hover video{opacity:1;}

/* VIDEO */
.video{text-align:center;}
video{width:90%;max-width:400px;border-radius:10px;margin-top:15px;}

/* CERTIFICATES */
.card-stack{
  position:relative;
  width:100%;
  max-width:350px;
  height:500px;
  margin:40px auto;
}
.card-cert{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:15px;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  transform: rotate(-90deg) scale(0.9);
  transition:0.5s;
}

/* TIMELINE */
.timeline{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:30px;}
.timeline-item{background:#0a0a0a;padding:15px;border-radius:15px;border:1px solid #222;min-width:180px;text-align:center;transition:.3s;}
.timeline-item:hover{transform:scale(1.05);box-shadow:0 0 20px cyan;}
.timeline-item img{width:50px;height:50px;}

/* CONTACT */
.icons{display:flex;gap:20px;margin-top:20px;}
.icons img{width:32px;transition:.3s;}
.icons img:hover{transform:scale(1.2);}

/* CURSOR */
#cursor{
  position:fixed;
  width:20px;
  height:20px;
  background:cyan;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:screen;
  transform:translate(-50%,-50%);
}

/* MOBILE */
@media(max-width:768px){
.hero-img{width:200px;}
.hero-img-secondary{width:200px;right:-60px;top:80px;opacity:0.08;}
.hero-text h1{font-size:2rem;}
.projects{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="cursor"></div>
<nav>Riyansh Singh</nav>

<section class="hero">
  <div class="container hero-flex">

    <img src="images/profile1.png" class="hero-img">

    <div class="hero-text">
      <h1>Hi, I'm Riyansh</h1>
      <p>Aspiring Engineer | Web Developer | Tech Enthusiast</p>
    </div>

  </div>

  <img src="images/profile2.png" class="hero-img-secondary">

</section>

<!-- KEEP REST SAME (no changes needed below) -->

<script>
gsap.registerPlugin(ScrollTrigger);
gsap.from(".hero-img",{y:-50,opacity:0,duration:1});
gsap.from(".hero-text",{y:50,opacity:0,duration:1,delay:0.3});

const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});
</script>

</body>
</html>
